<!DOCTYPE html>
<html>

<head>

<title>IPL Auction Login</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#1e293b;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#ef4444;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#dc2626;
}

</style>

</head>


<body>

<div class="login-box">

<h2>IPL Auction Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Team Name" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>

</html>
